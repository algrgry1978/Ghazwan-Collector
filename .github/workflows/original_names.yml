name: King_of_Hearts_Original_Names

on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Smart Filter and V2RayNG Format
        shell: python
        run: |
          import requests
          import base64
          import json

          urls = [
              "https://raw.githubusercontent.com/miladtahanian/Config-Collector/main/mixed_iran.txt",
              "https://shz.al/~WangCai"
          ]
          
          def process():
              final_configs = []
              target_ports = [':443', ':80']
              vmess_ports = [443, 80, "443", "80"]

              for url in urls:
                  try:
                      response = requests.get(url, timeout=15)
                      if response.status_code == 200:
                          lines = response.text.splitlines()
                          for line in lines:
                              line = line.strip()
                              if not line: continue
                              if "trojan://" in line or "vless://" in line:
                                  if any(port in line for port in target_ports):
                                      final_configs.append(line)
                              elif "vmess://" in line:
                                  try:
                                      b64_data = line.replace("vmess://", "")
                                      decoded = base64.b64decode(b64_data + '=' * (-len(b64_data) % 4)).decode('utf-8')
                                      config_json = json.loads(decoded)
                                      if config_json.get('port') in vmess_ports:
                                          final_configs.append(line)
                                  except: continue
                  except Exception as e:
                      print(f"Error: {e}")

              # دمج الروابط وتحويلها لـ Base64 بدون أسطر فارغة إضافية
              unique_configs = list(set(final_configs))
              combined_text = "\n".join(unique_configs)
              encoded_output = base64.b64encode(combined_text.encode('utf-8')).decode('utf-8')

              with open("king_of_hearts.txt", "w") as f:
                  f.write(encoded_output)

          process()

      - name: Push to GitHub
        run: |
          git config --global user.name "Ghazwan-Pro-Lab"
          git config --global user.email "lab@ghazwan.pro"
          git add king_of_hearts.txt
          git commit -m "Update: Optimized for v2rayNG" || exit 0
          git push
